<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — AuraClinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"></noscript>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:#F1F5F9;color:#0F172A;min-height:100vh;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;font-family:inherit}

    /* ── TOKENS ── */
    :root{
      --blue:#0066CC;--blue-dark:#004999;
      --teal:#00957A;
      --bg:#F1F5F9;--card:#FFFFFF;
      --border:#E2E8F0;--border-blue:rgba(0,102,204,0.18);
      --text:#0F172A;--text-2:#475569;--text-3:#94A3B8;
      --shadow-sm:0 1px 3px rgba(15,23,42,0.06),0 1px 2px rgba(15,23,42,0.04);
      --shadow-md:0 4px 12px rgba(15,23,42,0.08),0 2px 6px rgba(15,23,42,0.04);
      --shadow-lg:0 12px 32px rgba(15,23,42,0.1),0 4px 12px rgba(15,23,42,0.05);
      --r:12px;--r-lg:16px;--r-full:9999px;
      --ease:cubic-bezier(0.4,0,0.2,1);
    }

    /* ── LOGIN SCREEN ── */
    #loginScreen{
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:24px;
      background:radial-gradient(ellipse 70% 60% at 60% 20%,rgba(0,102,204,0.07) 0%,transparent 60%),#F1F5F9;
    }
    .login-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:20px;padding:40px;width:100%;max-width:400px;
      box-shadow:var(--shadow-lg);
    }
    .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    .login-logo-mark{
      width:38px;height:38px;border-radius:10px;
      background:linear-gradient(135deg,var(--blue),#0052A3);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 14px rgba(0,102,204,0.25);
    }
    .login-logo-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round}
    .login-logo-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.02em}
    .login-logo-name em{font-style:normal;color:var(--blue)}
    .login-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px}
    .login-sub{font-size:13.5px;color:var(--text-2);margin-bottom:26px}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .form-lbl{font-size:11.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-2)}
    .form-in{
      background:#F8FAFC;border:1.5px solid var(--border);border-radius:var(--r);
      padding:11px 14px;font-size:14px;color:var(--text);outline:none;width:100%;
      font-family:'DM Sans',sans-serif;transition:all .22s var(--ease);
    }
    .form-in:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(0,102,204,0.1)}
    .btn-login{
      width:100%;padding:13px;border-radius:var(--r-full);
      background:var(--blue);color:#fff;font-family:'DM Sans',sans-serif;
      font-size:14.5px;font-weight:600;
      box-shadow:0 4px 14px rgba(0,102,204,0.25);
      transition:all .22s var(--ease);margin-top:4px;
    }
    .btn-login:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,102,204,0.3)}
    .btn-login:disabled{opacity:0.6;transform:none;cursor:not-allowed}
    .login-error{
      display:none;margin-top:12px;padding:11px 14px;
      border-radius:var(--r);background:#FEF2F2;border:1px solid #FECACA;
      color:#DC2626;font-size:13px;
    }

    /* ── ADMIN SHELL ── */
    #adminShell{display:none;min-height:100vh}

    .admin-nav{
      position:sticky;top:0;z-index:100;
      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:0 28px;height:62px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:var(--shadow-sm);
    }
    .admin-nav-left{display:flex;align-items:center;gap:12px}
    .admin-nav-logo{display:flex;align-items:center;gap:9px}
    .admin-nav-mark{
      width:32px;height:32px;border-radius:8px;
      background:linear-gradient(135deg,var(--blue),#0052A3);
      display:flex;align-items:center;justify-content:center;
    }
    .admin-nav-mark svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round}
    .admin-nav-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;letter-spacing:-0.02em}
    .admin-nav-name em{font-style:normal;color:var(--blue)}
    .admin-badge{
      font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:var(--blue);background:#EFF6FF;border:1px solid var(--border-blue);
      padding:3px 9px;border-radius:var(--r-full);
    }
    .admin-nav-right{display:flex;align-items:center;gap:10px}
    .admin-email{font-size:13px;color:var(--text-2)}
    .btn-logout{
      padding:7px 16px;border-radius:var(--r-full);
      background:#F1F5F9;border:1px solid var(--border);
      font-size:13px;font-weight:600;color:var(--text-2);
      transition:all .18s;
    }
    .btn-logout:hover{background:#E2E8F0;color:var(--text)}

    /* ── MAIN ── */
    .admin-main{max-width:1200px;margin:0 auto;padding:32px 28px}

    /* stats row */
    .stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .stat-chip{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
      padding:20px 22px;box-shadow:var(--shadow-sm);
    }
    .stat-chip-num{font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1;margin-bottom:5px}
    .stat-chip-lbl{font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;font-weight:500}

    /* toolbar */
    .toolbar{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      margin-bottom:18px;
    }
    .toolbar-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:20px;flex:1}
    .filter-select{
      background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);
      padding:8px 13px;font-size:13px;color:var(--text);
      font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;
      -webkit-appearance:none;appearance:none;
      transition:border-color .18s;min-width:130px;
    }
    .filter-select:focus{border-color:var(--blue)}
    .btn-refresh{
      display:flex;align-items:center;gap:6px;
      padding:8px 16px;border-radius:var(--r);
      background:var(--card);border:1.5px solid var(--border);
      font-size:13px;font-weight:600;color:var(--text-2);
      transition:all .18s;
    }
    .btn-refresh:hover{background:#F1F5F9;color:var(--text)}
    .btn-refresh svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;transition:transform .4s}
    .btn-refresh.spinning svg{animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* table card */
    .table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{
      padding:12px 16px;text-align:left;font-size:11px;font-weight:700;
      text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);
      background:#F8FAFC;border-bottom:1px solid var(--border);white-space:nowrap;
    }
    td{padding:14px 16px;font-size:13.5px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#F8FAFC}
    .td-name{font-weight:600;color:var(--text)}
    .td-phone a{color:var(--blue);font-weight:500}
    .td-phone a:hover{text-decoration:underline}
    .td-date{color:var(--text-2);white-space:nowrap}
    .td-spec{color:var(--text-2)}
    .td-source{font-size:12px;color:var(--text-3)}

    /* status badges */
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:4px 11px;border-radius:var(--r-full);
      font-size:11.5px;font-weight:600;white-space:nowrap;
    }
    .badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .badge.pending  {background:#FEF9C3;color:#854D0E;border:1px solid #FDE68A}
    .badge.pending  .badge-dot{background:#D97706}
    .badge.confirmed{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0}
    .badge.confirmed .badge-dot{background:#059669}
    .badge.completed{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
    .badge.completed .badge-dot{background:#3B82F6}
    .badge.cancelled{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
    .badge.cancelled .badge-dot{background:#DC2626}

    /* action buttons */
    .action-wrap{display:flex;gap:6px;flex-wrap:wrap}
    .btn-action{
      padding:5px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;
      border:1.5px solid;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;
      white-space:nowrap;
    }
    .btn-confirm {color:#059669;border-color:#A7F3D0;background:#ECFDF5}
    .btn-confirm:hover{background:#059669;color:#fff;border-color:#059669}
    .btn-complete{color:#3B82F6;border-color:#BFDBFE;background:#EFF6FF}
    .btn-complete:hover{background:#3B82F6;color:#fff;border-color:#3B82F6}
    .btn-cancel  {color:#DC2626;border-color:#FECACA;background:#FEF2F2}
    .btn-cancel:hover{background:#DC2626;color:#fff;border-color:#DC2626}
    .btn-action:disabled{opacity:0.4;cursor:not-allowed}

    /* empty / loading states */
    .table-empty{padding:56px 24px;text-align:center;color:var(--text-3)}
    .table-empty svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.5;margin:0 auto 12px;display:block;opacity:.4}
    .table-empty p{font-size:14px}

    .loading-row td{text-align:center;padding:48px;color:var(--text-3);font-size:14px}

    /* toast */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
      background:#0F172A;color:#fff;padding:11px 22px;border-radius:var(--r-full);
      font-size:13.5px;font-weight:500;opacity:0;
      transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;
      white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:900px){
      .stats-strip{grid-template-columns:1fr 1fr}
      .admin-main{padding:20px 16px}
      .admin-nav{padding:0 16px}
      .admin-email{display:none}
      th:nth-child(5),td:nth-child(5),
      th:nth-child(6),td:nth-child(6){display:none}
    }
    @media(max-width:600px){
      .stats-strip{grid-template-columns:1fr 1fr}
      th:nth-child(4),td:nth-child(4){display:none}
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
      </div>
      <span class="login-logo-name">Aura<em>Clinic</em></span>
    </div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">Sign in to manage appointments.</div>
    <div class="form-group">
      <label class="form-lbl">Email</label>
      <input type="email" class="form-in" id="loginEmail" placeholder="admin@auraclinic.in" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-lbl">Password</label>
      <input type="password" class="form-in" id="loginPassword" placeholder="Your password" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ADMIN SHELL -->
<div id="adminShell">
  <nav class="admin-nav">
    <div class="admin-nav-left">
      <div class="admin-nav-logo">
        <div class="admin-nav-mark">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        <span class="admin-nav-name">Aura<em>Clinic</em></span>
      </div>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="admin-nav-right">
      <span class="admin-email" id="adminEmail"></span>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <main class="admin-main">

    <!-- Stats strip -->
    <div class="stats-strip">
      <div class="stat-chip">
        <div class="stat-chip-num" id="statTotal" style="color:var(--text)">—</div>
        <div class="stat-chip-lbl">Total</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-num" id="statPending" style="color:#D97706">—</div>
        <div class="stat-chip-lbl">Pending</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-num" id="statConfirmed" style="color:#059669">—</div>
        <div class="stat-chip-lbl">Confirmed</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-num" id="statCompleted" style="color:#3B82F6">—</div>
        <div class="stat-chip-lbl">Completed</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-title">Appointments</div>
      <select class="filter-select" id="filterStatus">
        <option value="all">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select class="filter-select" id="filterSpecialty">
        <option value="all">All Specialties</option>
        <option>General Medicine</option>
        <option>Cardiology</option>
        <option>Dermatology</option>
        <option>Dental Care</option>
        <option>Paediatrics</option>
        <option>Diagnostics</option>
      </select>
      <button class="btn-refresh" id="refreshBtn">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Patient</th>
              <th>Phone</th>
              <th>Specialty</th>
              <th>Date</th>
              <th>Source</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="apptTableBody">
            <tr class="loading-row"><td colspan="7">Loading appointments...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
  import {
    adminLogin, adminLogout, onAuthChange,
    getAppointments, updateAppointmentStatus
  } from './firebase-config.js';

  // ── State ────────────────────────────────────────────────────
  let allAppointments = [];

  // ── Elements ─────────────────────────────────────────────────
  const loginScreen   = document.getElementById('loginScreen');
  const adminShell    = document.getElementById('adminShell');
  const loginEmail    = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const loginBtn      = document.getElementById('loginBtn');
  const loginError    = document.getElementById('loginError');
  const adminEmailEl  = document.getElementById('adminEmail');
  const logoutBtn     = document.getElementById('logoutBtn');
  const tableBody     = document.getElementById('apptTableBody');
  const filterStatus  = document.getElementById('filterStatus');
  const filterSpec    = document.getElementById('filterSpecialty');
  const refreshBtn    = document.getElementById('refreshBtn');
  const toast         = document.getElementById('toast');

  // ── Auth state listener ──────────────────────────────────────
  onAuthChange(user => {
    if (user) {
      loginScreen.style.display  = 'none';
      adminShell.style.display   = 'block';
      adminEmailEl.textContent   = user.email;
      loadAppointments();
    } else {
      loginScreen.style.display  = 'flex';
      adminShell.style.display   = 'none';
    }
  });

  // ── Login ────────────────────────────────────────────────────
  async function doLogin() {
    const email    = loginEmail.value.trim();
    const password = loginPassword.value;
    if (!email || !password) {
      showLoginError('Please enter your email and password.');
      return;
    }
    loginBtn.disabled    = true;
    loginBtn.textContent = 'Signing in...';
    loginError.style.display = 'none';
    try {
      await adminLogin(email, password);
    } catch (err) {
      const msg = err.code === 'auth/invalid-credential'
        ? 'Invalid email or password.'
        : 'Sign-in failed. Please try again.';
      showLoginError(msg);
      loginBtn.disabled    = false;
      loginBtn.textContent = 'Sign In';
    }
  }

  loginBtn.addEventListener('click', doLogin);
  loginPassword.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function showLoginError(msg) {
    loginError.textContent   = msg;
    loginError.style.display = 'block';
  }

  // ── Logout ───────────────────────────────────────────────────
  logoutBtn.addEventListener('click', () => adminLogout());

  // ── Load appointments ────────────────────────────────────────
  async function loadAppointments() {
    refreshBtn.classList.add('spinning');
    tableBody.innerHTML = '<tr class="loading-row"><td colspan="7">Loading...</td></tr>';
    try {
      allAppointments = await getAppointments();
      updateStats();
      renderTable();
    } catch (err) {
      tableBody.innerHTML = '<tr class="loading-row"><td colspan="7">Failed to load. Check your Firestore rules.</td></tr>';
      console.error(err);
    }
    refreshBtn.classList.remove('spinning');
  }

  refreshBtn.addEventListener('click', loadAppointments);
  filterStatus.addEventListener('change', renderTable);
  filterSpec.addEventListener('change', renderTable);

  // ── Stats ────────────────────────────────────────────────────
  function updateStats() {
    const count = s => allAppointments.filter(a => a.status === s).length;
    document.getElementById('statTotal').textContent     = allAppointments.length;
    document.getElementById('statPending').textContent   = count('pending');
    document.getElementById('statConfirmed').textContent = count('confirmed');
    document.getElementById('statCompleted').textContent = count('completed');
  }

  // ── Render table ─────────────────────────────────────────────
  function renderTable() {
    const statusFilter = filterStatus.value;
    const specFilter   = filterSpec.value;

    const rows = allAppointments.filter(a => {
      const matchStatus = statusFilter === 'all' || a.status === statusFilter;
      const matchSpec   = specFilter   === 'all' || a.specialty === specFilter;
      return matchStatus && matchSpec;
    });

    if (rows.length === 0) {
      tableBody.innerHTML = `
        <tr><td colspan="7">
          <div class="table-empty">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <p>No appointments found.</p>
          </div>
        </td></tr>`;
      return;
    }

    tableBody.innerHTML = rows.map(a => {
      const date    = a.date ? formatDate(a.date) : '—';
      const source  = a.source === 'homepage' ? 'Homepage' : 'Booking page';
      const actions = buildActions(a);
      return `
        <tr data-id="${a.id}">
          <td class="td-name">${esc(a.name || '—')}</td>
          <td class="td-phone"><a href="tel:${esc(a.phone)}">${esc(a.phone || '—')}</a></td>
          <td class="td-spec">${esc(a.specialty || '—')}</td>
          <td class="td-date">${date}</td>
          <td class="td-source">${source}</td>
          <td><span class="badge ${a.status}"><span class="badge-dot"></span>${capitalise(a.status)}</span></td>
          <td><div class="action-wrap">${actions}</div></td>
        </tr>`;
    }).join('');

    // Attach action button listeners
    tableBody.querySelectorAll('.btn-action').forEach(btn => {
      btn.addEventListener('click', () => {
        const id     = btn.closest('tr').dataset.id;
        const status = btn.dataset.status;
        changeStatus(id, status, btn);
      });
    });
  }

  function buildActions(a) {
    const btns = [];
    if (a.status === 'pending')   btns.push(`<button class="btn-action btn-confirm"  data-status="confirmed">Confirm</button>`);
    if (a.status === 'confirmed') btns.push(`<button class="btn-action btn-complete" data-status="completed">Complete</button>`);
    if (a.status !== 'cancelled' && a.status !== 'completed')
      btns.push(`<button class="btn-action btn-cancel" data-status="cancelled">Cancel</button>`);
    return btns.join('') || '<span style="color:var(--text-3);font-size:12px;">No actions</span>';
  }

  // ── Status update ────────────────────────────────────────────
  async function changeStatus(id, status, btn) {
    btn.disabled = true;
    try {
      await updateAppointmentStatus(id, status);
      // Update local state without full reload
      const appt = allAppointments.find(a => a.id === id);
      if (appt) appt.status = status;
      updateStats();
      renderTable();
      showToast(`Marked as ${capitalise(status)}`);
    } catch (err) {
      console.error(err);
      showToast('Update failed. Try again.');
      btn.disabled = false;
    }
  }

  // ── Helpers ──────────────────────────────────────────────────
  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    } catch { return iso; }
  }

  function capitalise(str) {
    return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
